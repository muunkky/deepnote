                end-to-end through the real CLI and returns outputs, including
                at least one non-text/plain MIME bundle (not just a text echo)
              - The hardcoded 'python3' kernel name is replaced by a kernelName
                threaded RuntimeConfig -> ExecutionEngine ->
                KernelClient.connect(); existing Python notebooks behave
                identically (regression-free)
              - Pre-flight /api/kernelspecs validation yields a typed,
                actionable missing-kernel error (never the opaque server 500);
                missing-kernelspec vs registered-but-fails-to-launch categories
                are distinguishable and tested
              - All three Phase 1 ADRs accepted via the adversarial adr-reviewer
                gate (server/launch [ADR-002], kernel-name selection
                source/precedence, value-add/reactivity degradation) and a Phase
                1 design doc written + reviewed
              - 'CI green on the clean contrib/ branch: pnpm test, typecheck, lintAndFormat,
                spell-check'
              - 'Two diffs published as fork PRs and linked from issue #154 with an
                explicit offer to open the upstream PR: the clean contribution diff
                (contrib/<slug>, code-only) and the process diff (sprint-record/<TAG>,
                full lifecycle)'
    notes: The local-UI thread of this milestone (story s1 'Users run the
      familiar Deepnote Cloud UI locally') was promoted to its own milestone, m3
      'Local Deepnote UI' (peer to m1/m2), once PRD-003 was written. The
      m2/s1/local-ui stub is retired/superseded; see m3.
  m3:
    id: m3
    title: Local Deepnote UI
    description: 'A local browser-based notebook UI — open, view, edit, and reactively
      run .deepnote projects on local compute, launched from the CLI. The runtime-over-HTTP/WS
      backend + `deepnote serve` is the upstream-contributable wedge; the browser
      SPA is a fork-only showcase (per #162, which assigns the interactive UI to deepnote/vscode-deepnote).
      Re-leveled from the former m2/s1/local-ui stub into its own milestone, peer
      to m1/m2.'
    status: in_progress
    docs_ref: docs/prds/PRD-003-local-deepnote-ui.md
    notes: "Master PRD = PRD-003-local-deepnote-ui.md. The #162 boundary (interactive
      UI assigned to deepnote/vscode-deepnote; CLI/runtime owned by deepnote/deepnote)
      is the load-bearing scope decision: backend wedge is upstream-contributable,
      browser SPA is fork-only showcase. See PRD §'The resolution this PRD commits
      to'."
    stories:
      s1:
        id: s1
        title: Headless runtime server + one-command launch
        description: "THE UPSTREAM WEDGE. Expose runtime-core's existing headless
          execution over a stable, documented HTTP + WebSocket API (open project,
          list notebooks/blocks, run block(s), stream onBlockStart/onBlockDone/onOutput,
          save) with no UI required, plus a `deepnote serve`/`deepnote ui` CLI command
          that boots it over a local .deepnote project. Reuses ExecutionEngine + server-starter.ts
          + interpreter/kernel resolution exactly as run.ts composes them. This is
          the part offered upstream on #162. Covers PRD Phases P0 (architecture ADRs),
          P1 (headless server core), P6 (CLI integration), and P7 (decompose for upstream).
          Dev setup: cli/runtime-core area — Python 3 + jinja2; a venv with deepnote-toolkit[server];
          point pythonEnv/--python at it."
        status: todo
        sequence: 1
        depends_on: []
        docs_ref: docs/prds/PRD-003-local-deepnote-ui.md
        success_criteria:
          - "Headless API parity with `run`: a documented HTTP/WS client can open
            a project, run all blocks, and receive the same IOutputs deepnote run
            produces — 100% of run's executable block types stream identical IOutputs"
          - '`deepnote serve project.deepnote --no-open` starts a server and serves
            /api/project, returning the project tree over HTTP'
          - 'Streaming fidelity: every onBlockStart/onBlockDone/onOutput event from
            ExecutionEngine is delivered over the WS in order, with no dropped or
            reordered events across a full-project run'
          - 'Failure-category fidelity: API error payloads carry the same failureCategory
            discriminants as run.ts — missing-kernel / kernel-launch / kernel-died
            / in-block all distinguishable'
          - 'Save round-trip fidelity: open → save → re-deserialize yields a project
            deep-equal to the saved one; serialization is idempotent (a second no-op
            save produces an empty git diff). Byte-equality with the original file
            is explicitly NOT the bar'
          - 'Offered upstream: the backend + serve command are sliced as a clean contrib/*
            diff off upstream/main and the milestone update is posted to the fork
            dry-run showcase thread'
        projects:
          serve-api:
            id: serve-api
            title: HTTP + WebSocket server over runtime-core
            description: 'A new server package wrapping ExecutionEngine: open a project,
              list notebooks/blocks, run block(s), stream onBlockStart/onBlockDone/onOutput
              over WebSocket, and save — with no UI. Reuses server-starter.ts, interpreter/kernel
              resolution, integrations wiring, and reactivity exactly as run.ts composes
