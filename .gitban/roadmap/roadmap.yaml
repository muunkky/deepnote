            sequence: 1
            docs_ref: docs/prds/PRD-003-local-deepnote-ui.md
            features:
              dag-downstream-rerun:
                id: dag-downstream-rerun
                title: DAG-driven downstream re-run in dependency order
                description: On edit, compute downstream blocks via
                  getDownstreamBlocksForBlocksIds and re-run them in dependency
                  order against the persistent kernel session. Net-new wiring of
                  the analysis primitive into a live, ordered re-run loop.
                  Downstream re-runs are halted for a branch whose block raised
                  an exception.
                status: todo
                sequence: 1
              input-change-propagation-debounce:
                id: input-change-propagation-debounce
                title: Input-change propagation with commit/debounce
                description: Re-run an input's downstream blocks when its value
                  changes, firing on commit/debounce (slider release / short
                  settle), NOT continuously per intermediate value — a long
                  dependent chain re-running on every drag increment against a
                  Python kernel is a footgun the design must avoid. Exact
                  debounce/commit policy is a P5 design-doc detail.
                status: todo
                sequence: 2
                depends_on:
                  - dag-downstream-rerun
              python-only-degradation:
                id: python-only-degradation
                title: Python-only degradation notice
                description: "On a non-Python kernel (reactivity is Python-only today
                  — the DAG analyzer is a Python AST analyzer), degrade exactly as
                  run.ts does: run blocks in order, no dependency analysis, with a
                  visible 'reactivity disabled' notice (mirroring REACTIVITY_PYTHON_ONLY_NOTICE)
                  rather than silently mis-ordering."
                status: todo
                sequence: 3
                depends_on:
                  - dag-downstream-rerun
