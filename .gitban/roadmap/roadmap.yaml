      s8:
        id: s8
        title: The project has a healthy, secure, automated engineering
          foundation
        description: 'Contributors work in a well-tooled pnpm monorepo: consistent
          linting/formatting (Biome), multi-version CI with coverage gates, automated
          npm + PyPI publishing, dependency automation (Renovate), license checking,
          and a continuously-patched security posture. — Dev setup: baseline toolchain
          (Node 22.21.0, pnpm 10.19; `pnpm install --frozen-lockfile`). Reproduce
          CI locally with `pnpm lintAndFormat / test / typecheck / spell-check` and
          qlty (`qlty check`). Release/publish secrets (NPM_TOKEN, PyPI trusted publishing,
          CODECOV_TOKEN) are maintainer-only — not required for local work.'
        status: in_progress
        success_criteria:
          - A pnpm workspace hosts all packages with shared tooling
          - CI runs lint, typecheck, test, and spell-check across multiple Node
            versions with coverage
          - Packages publish automatically to npm (and the CLI to PyPI)
          - Dependencies are auto-updated and audited; security advisories are
            patched promptly
