                  (lint/format/typecheck/test/spell-check).
                sequence: 2
                status: done
                notes: 'Issue #8; PRs #20, #49, #194'
              ci-pipeline:
                id: ci-pipeline
                title: Multi-version CI & coverage
                description: CI running across multiple Node versions with pnpm
                  audit checks and Codecov coverage targets.
                sequence: 3
                status: done
                notes: 'Issue #152; PRs #207, #36, #22, #41'
              publishing:
