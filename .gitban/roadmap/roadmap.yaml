schema_version: 3.0.0
document_version: 0.1.0
last_updated: '2026-06-09'
metadata:
  maintained_by: Deepnote team + OSS contributors
  review_frequency: per-release
  related_docs:
    - README.md
    - FILES.md
    - CONTRIBUTING.md
    - AGENTS.md
  tools:
    roadmap_tracking: roadmap.yaml
    task_tracking: gitban cards
    Gitban_mcp: https://github.com/muunkky/gitban-mcp
milestones:
  m1:
    id: m1
    title: Deepnote Open Source toolchain
    description: 'The shipped open-source foundation: a family of npm/PyPI packages
      and a CLI that let anyone read, write, validate, convert, run, and AI-author
      the open .deepnote notebook format locally — independent of Deepnote Cloud.
      Spans @deepnote/{blocks,convert,cli,runtime-core,reactivity,database-integrations,mcp},
      the .deepnote file-format specification, snapshots, the documentation corpus,
      and the engineering foundation. Backfilled from ~280 merged PRs and the issue/epic
      history (Sept 2025 – Jun 2026).'
    status: in_progress
    start_date: '2025-09-01'
    stories:
      s1:
        id: s1
        title: The .deepnote format is open, fully specified, and
          machine-validated
        description: 'Anyone — human or tool — can read, write, and validate .deepnote
          files with confidence. The format is published, the block vocabulary is
          rich, and a shared Zod/JSON schema rejects malformed files while keeping
          the serialized YAML canonical across round-trips. — Dev setup: baseline
          toolchain only — Node 22.21.0 (nvm use), pnpm 10.19 (corepack enable), Docker;
          run `pnpm install --frozen-lockfile` then verify with `pnpm test / typecheck
          / lintAndFormat / spell-check`. @deepnote/blocks is pure TypeScript + Zod;
          no Python, databases, or services required.'
        status: done
        success_criteria:
          - The .deepnote and .snapshot.deepnote formats have a published
            specification (FILES.md)
          - A discriminated-union Zod schema validates every block type and
            rejects malformed files
          - Serialized YAML is canonical and stable across read/write
            round-trips
          - The block vocabulary covers code, SQL, inputs, display/charts, and
            rich text
        projects:
          file-format-spec:
            id: file-format-spec
            title: .deepnote file-format specification
            description: The human-readable specification and canonical
              constraints for .deepnote (project + notebooks) and
              .snapshot.deepnote files — YAML structure, block model, snapshot
              management, and provenance.
            status: done
            docs_ref: FILES.md
            features:
              format-documentation:
                id: format-documentation
                title: Published format specification (FILES.md)
                description: 'Complete spec of the .deepnote and .snapshot.deepnote
                  formats: schema, block types, snapshot model, contentHash provenance.'
                sequence: 1
                status: done
                docs_ref: FILES.md
                notes: 'Shipped via PRs #204, #216, #79, #78'
              canonical-yaml-constraints:
                id: canonical-yaml-constraints
                title: Canonical YAML constraints (parser + validator)
                description: Defined and enforced canonical constraints on the
                  .deepnote YAML form so files serialize consistently and stay
                  diff-friendly.
                sequence: 2
                status: done
                notes: 'Shipped via PRs #185, #306 (unify serialized formatting)'
              schema-strictness:
                id: schema-strictness
                title: Strictness & required-field enforcement
                description: Tightened format checking, including the temporary
                  blockGroup-required constraint for Cloud import compatibility.
                sequence: 3
                status: done
                notes: 'PRs #186, #191, #192; tracks issue #191'
          blocks-package:
            id: blocks-package
            title: '@deepnote/blocks — block model & codegen engine'
            description: TypeScript types, Zod schema, serialization, and
              code/markdown generation for all Deepnote block types. The
              canonical library every other package builds on. Current version
              4.5.1.
            status: done
            docs_ref: packages/blocks/README.md
            features:
              block-schema-zod:
                id: block-schema-zod
                title: Zod block schema & deserializer
                description: deepnoteFileSchema and DeepnoteBlock type derived
                  from a strict discriminated-union Zod schema; deserializer for
                  reading files.
                sequence: 1
                status: done
                notes: 'PRs #28, #71, #98, #29, #201 (discriminated union), #209 (optional
                  contentHash prefix)'
              python-codegen:
                id: python-codegen
                title: Python code generation
                description: Convert blocks (code, SQL, inputs, big-number) into
                  executable Python; exported codegen helpers for reuse.
                sequence: 2
                status: done
                notes: 'PRs #25, #379 (export codegen helpers + SQL block types),
                  #391 (dedupe SQL codegen)'
              markdown-conversion:
                id: markdown-conversion
                title: Markdown conversion
                description: Convert text blocks to/from markdown, including
                  heading, bullet (with indent), todo, and callout cells.
                sequence: 3
                status: done
                notes: 'PRs #25, #29, #347 (bullet indent support)'
              serialization:
                id: serialization
                title: .deepnote serialization functions
                description: Functions to serialize block trees back to
                  canonical .deepnote files with unified formatting.
                sequence: 4
                status: done
                notes: 'PRs #294, #306'
              dual-module-and-errors:
                id: dual-module-and-errors
                title: Dual ESM/CJS build & typed errors
                description: Dual ESM+CommonJS distribution and distinct
                  exception classes (e.g. UnsupportedBlockTypeError) instead of
                  generic Error.
                sequence: 5
                status: done
                notes: 'PRs #27, #268, #223'
          block-vocabulary:
            id: block-vocabulary
            title: Block type vocabulary
            description: 'The full set of Deepnote block families that make notebooks
              richer than plain code cells: code & SQL, interactive inputs, display/visualization,
              and rich text.'
            status: done
            docs_ref: skills/deepnote/references/blocks-code-and-sql.md
            features:
              code-and-sql-blocks:
                id: code-and-sql-blocks
                title: Code & SQL blocks
                description: Python code execution and SQL query blocks with
                  variable assignment, return-type validation, and per-block
                  table state.
                sequence: 1
                status: done
                notes: 'PRs #34 (table state), #391 (SQL codegen/return type)'
              input-blocks:
                id: input-blocks
                title: Interactive input blocks
                description: text, textarea, checkbox, select (single/multi),
                  slider, file, date, and date-range inputs that feed downstream
                  blocks as variables.
                sequence: 2
                status: done
                docs_ref: skills/deepnote/references/blocks-input.md
              display-blocks:
                id: display-blocks
                title: Display & visualization blocks
                description: Vega-Lite visualizations, big-number KPIs (Jinja2
                  templated), buttons, images, and separators.
                sequence: 3
                status: done
                docs_ref: skills/deepnote/references/blocks-display.md
                notes: 'PRs #45 (chart selection behavior)'
              text-blocks:
                id: text-blocks
                title: Rich text blocks
                description: Headings (h1–h3), paragraphs, bullet lists, todo
                  checkboxes, and callouts.
                sequence: 4
                status: done
                docs_ref: skills/deepnote/references/blocks-text.md
        docs_ref: FILES.md
        sequence: 1
      s2:
        id: s2
        title: Notebooks convert losslessly between Deepnote and other formats
        description: 'A user can bring a notebook from anywhere — Jupyter, Quarto,
          Percent, or Marimo — into the .deepnote format, edit it locally, and export
          it back, with platform-specific metadata and user edits preserved across
          the round-trip. — Dev setup: baseline toolchain only (Node 22.21.0, pnpm
          10.19, Docker; `pnpm install --frozen-lockfile`). @deepnote/convert is pure
          TypeScript; round-trip fixtures live under test-fixtures/. No Python or
          live services required.'
        status: done
        success_criteria:
          - Any supported format converts to .deepnote and back via one CLI/API
          - Jupyter .ipynb round-trips preserve platform metadata (Colab,
            SageMaker, Kaggle, Azure ML)
          - Format is auto-detected; Percent vs Marimo disambiguated
            automatically
          - User edits are preserved when re-converting Jupyter to Deepnote
        docs_ref: packages/convert/README.md
        sequence: 2
        projects:
          convert-package:
            id: convert-package
            title: '@deepnote/convert — bidirectional format converter'
            description: CLI tool and library for bidirectional conversion
              between .deepnote and Jupyter, Quarto, Percent, and Marimo.
              Current version 3.2.2.
            status: done
            docs_ref: packages/convert/README.md
            features:
              jupyter-bidirectional:
                id: jupyter-bidirectional
                title: Bidirectional Jupyter (.ipynb) conversion
                description: Convert .ipynb → .deepnote and .deepnote → .ipynb
                  with per-block export and metadata preservation; preserves
                  user edits on re-convert.
                sequence: 1
                status: done
                notes: 'Issue #159; PRs #46, #167, #215 (per-block export), #257 (preserve
                  user edits), #193 (platform metadata)'
              quarto-percent-marimo:
                id: quarto-percent-marimo
                title: Quarto, Percent & Marimo support
                description: 'Convert to/from Quarto (.qmd), Percent (.py # %%), and
                  Marimo (.py @app.cell) formats.'
                sequence: 2
                status: done
                notes: 'PRs #190, #250'
              format-detection:
                id: format-detection
                title: Automatic format detection
                description: detectFormat + NotebookFormat exports auto-detect
                  input format and disambiguate Percent vs Marimo .py files.
                sequence: 3
                status: done
                notes: 'PR #210'
              notebook-functions:
                id: notebook-functions
                title: Notebook function support
                description: Conversion support for Deepnote notebook-function
                  blocks.
                sequence: 4
                status: done
                notes: 'PR #250'
              dual-module-build:
                id: dual-module-build
                title: Dual ESM/CJS build
                description: Dual ESM+CommonJS distribution; replaced uuid with
                  crypto.randomUUID for CJS compatibility.
                sequence: 5
                status: done
                notes: 'PRs #211, #214'
      s3:
        id: s3
        title: Outputs are separated from source for clean diffs and verifiable
          provenance
        description: 'A user gets clean, version-control-friendly notebooks: source
          code lives in the .deepnote file while execution outputs live in companion
          .snapshot.deepnote files. contentHash links each output back to the exact
          code that produced it, so provenance is verifiable. — Dev setup: baseline
          toolchain only (Node 22.21.0, pnpm 10.19, Docker; `pnpm install --frozen-lockfile`).
          Snapshot logic spans the blocks/convert/cli packages but is pure TypeScript
          — no Python needed unless you regenerate snapshots via an actual notebook
          run (that path needs the s5 runtime).'
        status: done
        success_criteria:
          - Outputs are stored in .snapshot.deepnote files, separate from source
          - contentHash verifies which code produced each output
          - Snapshots are created automatically on convert and run
          - Both _latest and timestamped snapshots are produced on run
        docs_ref: FILES.md
        sequence: 3
        depends_on:
          - s1
        projects:
          snapshots:
            id: snapshots
            title: Snapshot model (outputs + provenance)
            description: The snapshot subsystem that separates outputs from
              source and provides code provenance via content hashing.
              Cross-cuts the blocks, convert, and cli packages.
            status: done
            docs_ref: FILES.md
            notes: 'Epic: issue #187 (Snapshots); issue #160 (separate runtime metadata
              and outputs)'
            features:
              snapshot-file-format:
                id: snapshot-file-format
                title: Snapshot fields & file format
                description: Added snapshot fields to the .deepnote file format
                  and defined the .snapshot.deepnote companion format separating
                  outputs from source.
                sequence: 1
                status: done
                notes: 'Issues #187, #160; PRs #184, #204'
              snapshot-creation-on-convert:
                id: snapshot-creation-on-convert
                title: Snapshot creation on convert
                description: Convert generates snapshots when importing
                  notebooks so existing outputs are preserved out-of-band.
                sequence: 2
                status: done
                notes: 'PR #225'
              content-hash-provenance:
                id: content-hash-provenance
                title: contentHash provenance
                description: computeSnapshotHash links outputs to the exact
                  source that produced them; input type widened to accept
                  minimal data; optional hash prefix.
                sequence: 3
                status: done
                notes: 'PRs #290, #209'
              timestamped-snapshots:
                id: timestamped-snapshots
                title: Timestamped snapshots on run
                description: deepnote run produces both _latest and timestamped
                  snapshots (fixes a bug where only _latest was written).
                sequence: 4
                status: done
                notes: 'Issue #309; PR #320'
      s4:
        id: s4
        title: Notebooks connect to data through SQL and database integrations
        description: 'A user can define and use SQL blocks against any of ~18 supported
          databases and warehouses, with the right authentication methods, SSL support,
          and validated connection metadata — the same integration model used by Deepnote
          Cloud, available locally. — Dev setup: @deepnote/database-integrations is
          pure TypeScript types + Zod schemas, so package/unit work needs the baseline
          toolchain only (Node 22.21.0, pnpm 10.19; `pnpm install --frozen-lockfile`)
          — no databases or credentials. End-to-end verification through the CLI is
          optional and needs a live DB: Docker for Postgres/MySQL/Mongo, or a cloud
          account + auth (BigQuery OAuth/service account, Snowflake, Redshift) with
          SSL certs / SSH tunnel where required (see docs/<integration>.md).'
        status: done
        success_criteria:
          - ~18 database/warehouse integration types are defined and selectable
          - Each integration declares valid authentication methods and metadata
            schema
          - SSL-capable integrations are correctly identified and configurable
          - Integration metadata is validated by Zod schemas with backward
            compatibility for legacy configs
        docs_ref: packages/database-integrations/README.md
        sequence: 4
        projects:
          database-integrations-package:
            id: database-integrations-package
            title: '@deepnote/database-integrations'
            description: TypeScript types, runtime catalogs, and Zod metadata
              schemas for Deepnote SQL/database integrations. Current version
              1.4.3.
            status: done
            docs_ref: packages/database-integrations/README.md
            features:
              integration-type-catalog:
                id: integration-type-catalog
                title: Integration type catalog
                description: 'Catalog of supported integrations: Athena, Redshift,
                  ClickHouse, Databricks, Dremio, AlloyDB, BigQuery, Spanner, MariaDB,
                  Materialize, SQL Server, MindsDB, MongoDB, MySQL, PostgreSQL, Snowflake,
                  Trino, and pandas DataFrame SQL. Exposes DatabaseIntegrationType
                  and SQL/SSL subsets.'
                sequence: 1
                status: done
                notes: 'PR #70 (package created); ongoing additions'
              auth-method-schemas:
                id: auth-method-schemas
                title: Authentication method schemas
                description: Per-integration auth method definitions including
                  Trino auth methods, BigQuery/Snowflake federated auth, and
                  backward compatibility for legacy auth configs.
                sequence: 2
                status: done
                notes: 'PRs #150, #158, #168 (Trino), #166/#156 (BigQuery legacy),
                  #127 (Snowflake federated), #146 (Redshift legacy)'
              ssl-and-connection-args:
                id: ssl-and-connection-args
                title: SSL support & connection args
                description: databaseIntegrationTypesWithSslSupport plus
                  connection-arg handling (e.g. Trino client_tags, SSH options
                  typing).
                sequence: 3
                status: done
                notes: 'PRs #123, #135, #176'
              metadata-zod-schemas:
                id: metadata-zod-schemas
                title: Metadata Zod schemas & config validation
                description: databaseMetadataSchemasByType and
                  databaseIntegrationConfigSchema validate integration metadata
                  by type.
                sequence: 4
                status: done
                notes: 'PRs #124, #142'
              case-insensitive-id-filtering:
                id: case-insensitive-id-filtering
                title: Case-insensitive built-in integration ID filtering
                description: 'Known gap: built-in integration ID filtering should
                  be normalized to be case-insensitive.'
                sequence: 5
                status: done
                notes: 'Closed by card 234rnd / PR deepnote/deepnote#399 (Closes #325).
                  Single shared isBuiltinIntegration() helper normalizes built-in
                  ID matching to be case-insensitive across collect-integrations.ts
                  and analysis.ts. Out-of-scope external-ID case-insensitivity tracked
                  in backlog card ca0ios.'
                cards_ref: 234rnd (done); ca0ios (backlog follow-up)
      s5:
        id: s5
        title: Deepnote projects run locally from the command line
        description: "A user can install one CLI and run, inspect, lint, validate,
          convert, diff, and analyze .deepnote (and .ipynb/.py/.qmd) files locally
          — with reactive execution that re-runs only the dependent blocks, venv auto-detection,
          and on-the-fly database integration credentials. Powered by a reusable execution
          engine and a dependency-graph (reactivity) library. — Dev setup: baseline
          toolchain PLUS Python, since execution is delegated to a Python kernel.
          Install Python 3, then `pip install jinja2` (reactivity's AST analyzer spawns
          python3; jinja2 parses SQL variable deps) and create a venv with `pip install
          \"deepnote-toolkit[server]\"` (runtime-core's ExecutionEngine boots the
          toolkit server). Point pythonEnv/--python at that venv. Bun is only for
          the PyPI release build, not local dev."
        status: in_progress
        success_criteria:
          - deepnote run executes any supported notebook format locally
          - Reactive execution re-runs only blocks downstream of a change
          - The CLI ships to both npm and PyPI (pip install deepnote-cli)
          - MCP/CLI parity for lint, stats, and exit codes
          - The execution engine is reusable outside the CLI (e.g. in the VS
            Code extension)
        docs_ref: packages/cli/README.md
        sequence: 5
        depends_on:
          - s1
          - s2
        projects:
          cli-package:
            id: cli-package
            title: '@deepnote/cli — local command surface'
            description: 'Command-line interface to run Deepnote projects locally
              and on Cloud. Commands: run, inspect, cat, lint, stats, validate, diff,
              dag, analyze, convert, open, integrations, install-skills. Ships to
              npm and PyPI. Current version 0.6.1 (active development).'
            status: in_progress
            docs_ref: packages/cli/README.md
            notes: 'Epic: issue #218 (Deepnote CLI); PR #219 (skeleton)'
            features:
              run-command:
                id: run-command
                title: run command
                description: Execute .deepnote/.ipynb/.py/.qmd files locally
                  with --input overrides, --list-inputs, --dry-run, --open,
                  --top/--profile, and correct exit codes for missing
                  inputs/integrations.
                sequence: 1
                status: done
                notes: 'PRs #220, #231, #240, #252, #236, #232, #303'
              inspection-commands:
                id: inspection-commands
                title: Inspection commands (inspect, cat, stats, lint, validate,
                  diff, dag)
                description: Read-only tooling to inspect block contents, show
                  stats, lint for issues, validate against schema, diff two
                  files, and render the reactivity DAG.
                sequence: 2
                status: done
                notes: 'PRs #227, #230, #242, #243, #109, #249, #241 (smart file discovery)'
              convert-command:
                id: convert-command
                title: convert command
                description: Notebook format conversion exposed through the CLI,
                  wrapping @deepnote/convert.
                sequence: 3
                status: done
                notes: 'PR #228'
              analyze-and-llm-output:
                id: analyze-and-llm-output
                title: analyze command & LLM-optimized output
                description: analyze command with import/context features, plus
                  LLM-friendly output formats (TOON, llm) for feeding notebooks
                  to models.
                sequence: 4
                status: done
                notes: 'PRs #254, #238 (TOON), #263 (llm output), #315'
              integrations-management:
                id: integrations-management
                title: integrations command
                description: 'Manage database integrations from the CLI: add/edit
                  (Postgres, Mongo, and more), pull credentials on the fly during
                  execution, with graceful error handling.'
                sequence: 5
                status: done
                notes: 'PRs #248, #275, #287, #321, #276, #313'
              venv-support:
                id: venv-support
                title: venv detection & Python environment selection
                description: Smart virtualenv auto-detection and --python
                  selection so notebooks run in the right Python environment.
                sequence: 6
                status: done
                notes: 'Issue #180; PRs #234, #312, #314'
              skill-install:
                id: skill-install
                title: Deepnote skill installation
                description: Bundles and installs a Deepnote agent skill
                  (skills/deepnote) so AI coding tools learn the format and CLI.
                sequence: 7
                status: done
                notes: 'PR #277; skill resolution fix #314'
              cli-mcp-parity:
                id: cli-mcp-parity
                title: CLI/MCP parity & standardized exit codes
                description: Standardized exit codes and lint/stats parity
                  between the CLI and the MCP server.
                sequence: 8
                status: done
                notes: 'PRs #300, #301'
              h2-dot-escaping-bug:
                id: h2-dot-escaping-bug
                title: Fix compounding dot-escaping in text-cell-h2
                description: 'Known bug: text-cell-h2 dot escaping compounds on each
                  run.'
                sequence: 9
                status: todo
                notes: 'Open issue #323'
          runtime-core-package:
            id: runtime-core-package
            title: '@deepnote/runtime-core — execution engine'
            description: Core runtime for executing Deepnote projects via an
              ExecutionEngine, backed by deepnote-toolkit[server]. Designed to
              be reused across the CLI and the VS Code extension. Current
              version 0.3.0 (active development).
            status: in_progress
            docs_ref: packages/runtime-core/README.md
            notes: 'Open epic: issue #162 (make Deepnote a first-class notebook runtime)'
            features:
              execution-engine:
                id: execution-engine
                title: ExecutionEngine
                description: Start/stop a Python runtime and run a .deepnote
                  file block-by-block with onBlockStart/onBlockDone callbacks
                  and an execution summary.
                sequence: 1
                status: done
                notes: 'PRs #280, #317'
              reactive-block-execution:
                id: reactive-block-execution
                title: Reactive single-block execution
                description: Running a single block also runs its dependent
                  upstream blocks so the notebook stays consistent.
                sequence: 2
                status: done
                notes: 'PR #272'
              helper-exports-and-reuse:
                id: helper-exports-and-reuse
                title: Reusable helper exports
                description: Exported runtime-core helpers and refactored the
                  agent-block runner so the runtime can be reused in the VS Code
                  extension.
                sequence: 3
                status: done
                notes: 'PRs #339, #342, #370'
              jupyter-ws-bun-compat:
                id: jupyter-ws-bun-compat
                title: Jupyter WebSocket / Bun compatibility
                description: Disabled the Jupyter binary WebSocket protocol for
                  Bun compatibility.
                sequence: 4
                status: done
                notes: 'PR #324'
          reactivity-package:
            id: reactivity-package
            title: '@deepnote/reactivity — dependency graph'
            description: Builds a DAG of block dependencies via a Python AST
              analyzer to power reactive execution. Open-sourced from Deepnote's
              internal codebase. Current version 1.2.0.
            status: done
            docs_ref: packages/reactivity/README.md
            notes: 'Issue #195; PR #196 (open-source the reactivity library)'
            features:
              dependency-dag:
                id: dependency-dag
                title: Dependency DAG (getDagForBlocks)
                description: Analyzes block content and builds a directed
                  acyclic graph of variable defs/uses across Python, SQL,
                  button, big-number, notebook-function, and input blocks;
                  supports partial DAGs.
                sequence: 1
                status: done
                notes: 'PR #196'
              reactive-downstream:
                id: reactive-downstream
                title: Downstream computation (getDownstreamBlocks)
                description: Identifies all blocks that must re-run when
                  upstream blocks change — the core of reactive execution.
                sequence: 2
                status: done
              ast-analyzer:
                id: ast-analyzer
                title: Python AST analyzer
                description: Ships a Python (jinja2-backed) AST analyzer in the
                  distribution; pythonInterpreter override supported.
                sequence: 3
                status: done
                notes: 'PR #200'
      s6:
        id: s6
        title: AI agents can author, edit, and execute Deepnote notebooks
        description: 'An AI coding agent (in Cursor, Claude, etc.) can create, convert,
          enhance, fix, and run Deepnote notebooks through a purpose-built MCP server,
          and notebooks themselves can contain agent blocks that an LLM executes at
          runtime — making Deepnote AI-native locally. — Dev setup: baseline toolchain
          for the @deepnote/mcp server (pure TypeScript). To exercise it live, wire
          it into an MCP client (Cursor/Claude) per packages/mcp/README.md. Agent-block
          execution runs through runtime-core, so it inherits the s5 Python prereqs
          (Python 3, jinja2, a deepnote-toolkit[server] venv) and needs an AI provider
          key/credentials for the LLM.'
        status: in_progress
        success_criteria:
          - An MCP server exposes bounded, contract-first tools for notebook
            create/edit/convert/execute
          - MCP prompts provide reusable workflows (debug_execution,
            create_notebook, convert_and_enhance)
          - Notebooks support an agent block type that runs against an LLM at
            runtime
          - MCP and CLI stay at parity for shared operations
        sequence: 6
        depends_on:
          - s1
          - s5
        projects:
          mcp-server:
            id: mcp-server
            title: '@deepnote/mcp — MCP server'
            description: 'Model Context Protocol server for AI-assisted Deepnote notebook
              creation, editing, conversion, and execution. Follows MCP best practices:
              server instructions, bounded toolsets, contracts-first, reusable prompts.
              Current version 0.3.2 (active development).'
            status: in_progress
            docs_ref: packages/mcp/README.md
            notes: 'PR #273 (v1)'
            features:
              mcp-tooling:
                id: mcp-tooling
                title: Bounded MCP toolset
                description: Focused tools for
                  create/enhance/fix/convert/execute with explicit schemas; tool
                  set culled to let the model do the looping and to optimize
                  token usage.
                sequence: 1
                status: done
                notes: 'PRs #273, #258, #259, #271'
              mcp-prompts:
                id: mcp-prompts
                title: MCP workflow prompts
                description: 'Reusable prompt templates: debug_execution, create_notebook,
                  convert_and_enhance.'
                sequence: 2
                status: done
                notes: 'PR #273; docs PRs #385, #386'
