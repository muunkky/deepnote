name: CD PyPI CLI

on:
  push:
    tags:
      - '@deepnote/cli@*'

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform-tag: manylinux2014_x86_64
          - os: macos-14
            platform-tag: macosx_11_0_arm64
          - os: windows-2022
            platform-tag: win_amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI package
        run: pnpm --filter @deepnote/cli... run build

      - name: Sync PyPI version with CLI version
        run: python packages/cli/pypi/scripts/set_version.py

      - name: Determine binary name
        id: binary
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            echo "name=deepnote.exe" >> "$GITHUB_OUTPUT"
          else
            echo "name=deepnote" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare binary directory
        shell: bash
        run: |
          mkdir -p packages/cli/pypi/src/deepnote_cli/bin
          rm -f packages/cli/pypi/src/deepnote_cli/bin/deepnote
          rm -f packages/cli/pypi/src/deepnote_cli/bin/deepnote.exe

      - name: Build Bun executable
        run: bun build packages/cli/dist/bin.js --compile --outfile packages/cli/pypi/src/deepnote_cli/bin/${{ steps.binary.outputs.name }}

      - name: Copy bundled skills into PyPI package
        shell: bash
        run: |
          rm -rf packages/cli/pypi/src/deepnote_cli/skills
          cp -r packages/cli/dist/skills packages/cli/pypi/src/deepnote_cli/skills

      - name: Install Python build tools
        run: python -m pip install --upgrade pip build wheel setuptools

      - name: Build wheel
        run: python -m build --wheel packages/cli/pypi --outdir packages/cli/pypi/dist

      - name: Retag wheel
        shell: bash
        run: python -m wheel tags --platform-tag=${{ matrix.platform-tag }} --python-tag=py3 --abi-tag=none --remove packages/cli/pypi/dist/*.whl

      - name: Smoke test wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall packages/cli/pypi/dist/*.whl
          python -m deepnote_cli --version

      - name: Upload wheel artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheel-${{ matrix.os }}
          path: packages/cli/pypi/dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Validate wheel metadata
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*.whl

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist
